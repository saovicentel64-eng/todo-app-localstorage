<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 To-Do List - Local Storage App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 min-h-screen transition-colors duration-300">

<!-- NAVBAR -->
<nav class="bg-white dark:bg-gray-800 shadow-md sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 flex items-center gap-2">
            <i data-lucide="check-circle-2" class="w-6 h-6"></i>
            To-Do List
        </h1>
        
        <div class="flex items-center gap-4">
            <button id="themeToggle" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full transition-colors" title="Alternar tema">
                <i data-lucide="moon" class="w-5 h-5 text-gray-600 dark:hidden"></i>
                <i data-lucide="sun" class="w-5 h-5 text-yellow-400 hidden dark:block"></i>
            </button>
            
            <button id="clearAllBtn" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg transition-colors font-bold text-sm">
                🗑️ Limpar Tudo
            </button>
        </div>
    </div>
</nav>

<!-- MAIN CONTAINER -->
<main class="max-w-4xl mx-auto px-4 py-8">
    
    <!-- HEADER SECTION -->
    <div class="mb-8">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-8 border border-gray-100 dark:border-gray-700">
            <h2 class="text-3xl font-bold text-gray-800 dark:text-white mb-2">✨ Bem-vindo de volta!</h2>
            <p class="text-gray-600 dark:text-gray-400 mb-6">Organize suas tarefas e aumente sua produtividade</p>
            
            <!-- INPUT FORM -->
            <form id="todoForm" class="flex gap-2 mb-6">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="Adicione uma nova tarefa..." 
                    class="flex-1 px-4 py-3 border-2 border-gray-200 dark:border-gray-600 rounded-lg focus:outline-none focus:border-blue-500 dark:bg-gray-700 dark:text-white transition-colors"
                    autocomplete="off"
                />
                <button 
                    type="submit" 
                    class="px-6 py-3 bg-gradient-to-r from-blue-500 to-purple-600 text-white font-bold rounded-lg hover:shadow-lg transition-all transform hover:-translate-y-0.5"
                >
                    <i data-lucide="plus" class="w-5 h-5 inline mr-2"></i>
                    Adicionar
                </button>
            </form>
            
            <!-- FILTERS -->
            <div class="flex gap-2 flex-wrap">
                <button class="filter-btn active px-4 py-2 rounded-lg font-semibold transition-all" data-filter="all">
                    📋 Todas (0)
                </button>
                <button class="filter-btn px-4 py-2 rounded-lg font-semibold transition-all" data-filter="active">
                    ⏳ Ativas (0)
                </button>
                <button class="filter-btn px-4 py-2 rounded-lg font-semibold transition-all" data-filter="completed">
                    ✅ Concluídas (0)
                </button>
                <button class="filter-btn px-4 py-2 rounded-lg font-semibold transition-all" data-filter="favorite">
                    ⭐ Favoritas (0)
                </button>
            </div>
        </div>
    </div>

    <!-- STATS SECTION -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4 border-l-4 border-blue-500">
            <p class="text-gray-600 dark:text-gray-400 text-sm font-medium">Total</p>
            <p class="text-3xl font-bold text-gray-800 dark:text-white mt-1" id="statTotal">0</p>
        </div>
        
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4 border-l-4 border-yellow-500">
            <p class="text-gray-600 dark:text-gray-400 text-sm font-medium">Ativas</p>
            <p class="text-3xl font-bold text-gray-800 dark:text-white mt-1" id="statActive">0</p>
        </div>
        
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4 border-l-4 border-green-500">
            <p class="text-gray-600 dark:text-gray-400 text-sm font-medium">Concluídas</p>
            <p class="text-3xl font-bold text-gray-800 dark:text-white mt-1" id="statCompleted">0</p>
        </div>
        
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4 border-l-4 border-red-500">
            <p class="text-gray-600 dark:text-gray-400 text-sm font-medium">Progresso</p>
            <div class="mt-2 bg-gray-200 dark:bg-gray-700 rounded-full h-2 overflow-hidden">
                <div id="progressBar" class="bg-gradient-to-r from-green-400 to-green-600 h-full transition-all" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- TODO LIST -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 overflow-hidden">
        
        <!-- EMPTY STATE -->
        <div id="emptyState" class="p-12 text-center">
            <i data-lucide="inbox" class="w-16 h-16 text-gray-300 dark:text-gray-600 mx-auto mb-4"></i>
            <p class="text-gray-500 dark:text-gray-400 text-lg font-semibold">Nenhuma tarefa ainda</p>
            <p class="text-gray-400 dark:text-gray-500 text-sm mt-2">Adicione sua primeira tarefa acima!</p>
        </div>
        
        <!-- TODO LIST -->
        <ul id="todoList" class="divide-y divide-gray-100 dark:divide-gray-700">
        </ul>
    </div>

</main>

<!-- FOOTER -->
<footer class="text-center py-8 text-gray-600 dark:text-gray-400 text-sm">
    <p>💾 Dados salvos automaticamente no Local Storage | v1.0.0</p>
</footer>

<!-- Scripts -->
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
